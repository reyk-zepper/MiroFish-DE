name: MiroFish-DE checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-and-locales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Validate locale coverage
        run: npm run validate:locales
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        run: npm run build
